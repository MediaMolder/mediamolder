      - flag: "-map p:N (program selection)"
        status: missing
        schema: n/a
        notes: MPEG-TS multi-program inputs
      - flag: "-map_metadata / -map_chapters"
        status: missing
        schema: n/a
        notes: see §2.5
      - flag: "-vn / -an / -sn / -dn (per output)"
        status: partial
        schema: graph edges
      - flag: "split / asplit reuse of one decoded stream"
        status: covered
        schema: pipeline.GraphDef.Edges
      - flag: "attachment streams"
        status: missing
        schema: n/a

  - id: filtergraph
