        notes: unblocked xfade/acrossfade
      - flag: "-filter_complex_threads"
        status: missing
        schema: n/a
      - flag: "-filter_threads"
        status: partial
        schema: n/a
      - flag: "filter quoting (, ; ' in values)"
        status: covered
