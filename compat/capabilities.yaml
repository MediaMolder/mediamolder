      - flag: "hwupload / hwdownload / hwmap"
        status: partial
        schema: n/a
      - flag: "filter expression engine (t,n,tw,th,enable=…)"
        status: partial
        schema: n/a
        notes: strings reach libavfilter intact; no GUI authoring/validation
      - flag: "setsar / setdar"
        status: partial
        schema: n/a
      - flag: "arnndn (model-file filter)"
        status: partial
        schema: n/a
      - flag: "zscale + tonemap (HDR)"
        status: partial
        schema: n/a
        notes: requires libzimg; no feature probe
      - flag: "minterpolate"
        status: partial
        schema: n/a
