# MediaMolder ↔ FFmpeg capability registry.
#
# Machine-readable inventory of every FFmpeg CLI flag (or capability)
# tracked by the coverage roadmap (docs/ffmpeg-coverage-roadmap.md §2).
# Each entry pairs an FFmpeg flag with its current MediaMolder coverage
# status and a pointer at the schema field / code location that handles
# it.
#
# Status legend:
#   covered      — first-class schema field; round-trip / unit tests exist
#   partial      — works (often via AVDict passthrough) but not validated,
#                  not surfaced in the GUI, or only the common case is wired
#   missing      — no support today
#   out-of-scope — intentionally not planned (e.g. obsolete flag, dev-only)
#
# `schema` is a dotted path into pipeline.Config (Go) or, when a flag has
# no schema home yet, a code location (`pipeline/handlers.go:foo`) or the
# string "n/a".
#
# This file is the source of truth that the GUI's "unsupported flag"
# importer report and the compat/ffcli round-trip test selector both
# consume. Keep it in sync with §2 of the roadmap.

schema_version: 1

sections:

  - id: inputs
    title: Inputs / demux (roadmap §2.1)
    flags:
      - flag: "-i"
        status: covered
        schema: pipeline.Input.URL
        notes: forwarded to avformat_open_input; file/http/rtmp/rtsp/srt/pipe/device
      - flag: "-ss (input)"
        status: covered
        schema: pipeline.Input.Options.ss
        notes: parsed via av.ParseTime; demuxer-side seek (pipeline/timing.go)
      - flag: "-t (input)"
        status: covered
        schema: pipeline.Input.Options.t
        notes: per-packet recording_time stop check
      - flag: "-to (input)"
        status: covered
        schema: pipeline.Input.Options.to
        notes: converted to recording_time = to - max(ss,0)
      - flag: "-itsoffset"
        status: missing
        schema: n/a
        notes: per-input PTS offset; required for A/V re-sync
      - flag: "-stream_loop"
        status: missing
        schema: n/a
      - flag: "-readrate / -re"
        status: missing
        schema: n/a
        notes: live-stream restreaming
      - flag: "-framerate / -r (input)"
        status: partial
        schema: pipeline.Input.Options
        notes: AVDict passthrough; not validated
      - flag: "-pix_fmt / -video_size / -pixel_format (input)"
        status: partial
        schema: pipeline.Input.Options
      - flag: "-f (input)"
        status: partial
        schema: pipeline.Input.Kind
        notes: lavfi covered via Input.Kind; arbitrary forced demuxers (rawvideo,s16le) not yet first-class
      - flag: "-thread_queue_size"
        status: partial
        schema: pipeline.Input.Options
      - flag: "-accurate_seek / -noaccurate_seek / -seek_timestamp"
        status: missing
        schema: n/a
      - flag: "-protocol_whitelist"
        status: partial
        schema: pipeline.Input.Options
        notes: should be elevated for security review
      - flag: "-f lavfi"
        status: covered
        schema: pipeline.Input.Kind
        notes: anullsrc/color/sine/testsrc/smptebars; libavdevice linked + avdevice_register_all() at init
      - flag: "image2 glob (-i 'frames/*.png')"
        status: partial
        schema: pipeline.Input.Options
      - flag: "concat demuxer (listfile)"
        status: missing
        schema: n/a
        notes: "today users build a concat filter graph; no concat: input kind"
      - flag: "-f avfoundation / dshow / v4l2 (capture)"
        status: partial
        schema: pipeline.Input.Options
      - flag: "-hwaccel / -hwaccel_device / -hwaccel_output_format"
        status: partial
        schema: pipeline.Config.GlobalOptions.HardwareAccel
        notes: global only; not per-input

  - id: stream_selection
