  - id: encoders
    title: Encoders (roadmap §2.4)
    flags:
      - flag: "-c:v / -vcodec"
        status: covered
        schema: pipeline.Output.CodecVideo
      - flag: "-c:a / -acodec"
        status: covered
        schema: pipeline.Output.CodecAudio
      - flag: "-c:s / -scodec"
        status: covered
        schema: pipeline.Output.CodecSubtitle
      - flag: "-c copy / -c:v copy / -c:a copy"
        status: covered
        schema: graph.KindCopy
      - flag: "-preset / -crf / -tune / -profile / -level / -g / -bf / -refs"
        status: covered
        schema: pipeline.Output.EncoderParamsVideo
        notes: forwarded to avcodec_open2 via AVDict
      - flag: "-x264-params / -x265-params / -svtav1-params / -aom-params"
        status: covered
        schema: pipeline.Output.EncoderParamsVideo
      - flag: "-b:v / -b:a / -maxrate / -minrate / -bufsize"
        status: covered
        schema: pipeline.Output.EncoderParamsVideo / Audio
      - flag: "hardware encoders (NVENC/QSV/VAAPI/VideoToolbox/AMF)"
        status: covered
        schema: av/hwencode.go
      - flag: "-pass 1/2 -passlogfile (two-pass video)"
        status: covered
        schema: pipeline.Output.Pass / pipeline.Output.PassLogFile
      - flag: "two-pass loudnorm shuttle"
        status: covered
        schema: pipeline.Output.LoudnormPass / pipeline.Output.LoudnormStatsFile
        notes: distinct from generic two-pass; pass-1 JSON → pass-2 AVOpts
      - flag: "lossless intermediates (FFV1/ProRes/DNxHD/HuffYUV)"
        status: partial
        schema: pipeline.Output.CodecVideo
        notes: encoder availability depends on FFmpeg build; no codec↔container validation
      - flag: "-fps_mode (cfr/vfr/passthrough/drop)"
        status: covered
        schema: pipeline.Output.FPSMode
        notes: single biggest cause of A/V drift; -vsync is rewritten to -fps_mode by compat/ffcli
      - flag: "-async N (audio resync)"
        status: covered
        schema: pipeline.Output.AudioSync
        notes: legacy flag (removed from FFmpeg 8.0 CLI); compat/ffcli accepts it and the runtime injects an aresample filter (async=N, plus first_pts=0 when N==1) in front of the audio encoder
      - flag: "-force_key_frames"
        status: covered
        schema: pipeline.Output.ForceKeyFrames
        notes: expr:EXPR (libavutil per-frame expression), source (copy from input), or comma-separated time list
      - flag: "per-stream encoder options (-b:v:0 ≠ -b:v:1)"
        status: missing
        schema: n/a
        notes: ABR ladder per-stream override
      - flag: "color metadata (-color_range/-color_primaries/-color_trc/-colorspace)"
        status: covered
        schema: pipeline.Output.Color
        notes: per-stream color tagging via av_opt_set on AVStream codecpar before WriteHeader
      - flag: "HDR10 mastering display + CLL metadata"
        status: covered
        schema: pipeline.Output.HDR
        notes: SMPTE ST 2086 + CTA-861.3 attached as AV_PKT_DATA_MASTERING_DISPLAY_METADATA / AV_PKT_DATA_CONTENT_LIGHT_LEVEL on stream codecpar.coded_side_data; codec/container compat enforced at validate time
      - flag: "Dolby Vision RPU passthrough"
        status: missing
        schema: n/a
      - flag: "-aspect"
        status: covered
        schema: pipeline.Output.DAR
        notes: importer rewrites legacy `-aspect A:B` to Output.DAR
      - flag: "-enc_time_base"
        status: missing
        schema: n/a
      - flag: "-field_order (interlaced encode)"
        status: missing
        schema: n/a
      - flag: "-fpre / -vpre (encoder presets from disk)"
        status: missing
        schema: n/a

  - id: muxers
    title: Muxers / outputs (roadmap §2.5)
    flags:
      - flag: "container auto-detect from extension"
        status: covered
        schema: pipeline.Output.URL
      - flag: "-f (force format on output)"
        status: covered
        schema: pipeline.Output.Format
      - flag: "-ss / -t / -to (output-side)"
        status: covered
        schema: pipeline.Output.Options
        notes: pipeline/handlers.go::handleSink resolves output-side ss/t/to via resolveOutputTiming and drops/stops packets accordingly; with Config.CopyTS the trim window is interpreted as absolute timeline values, otherwise kept packets are shifted back so the file anchors at PTS 0 (mirrors of_streamcopy).
      - flag: "-shortest"
        status: covered
        schema: pipeline.Output.Shortest
        notes: handleSink records the PTS at which the first feeder channel closes and drains-and-drops further packets on the remaining channels of the same output; mirrors per-output sync-queue cap in fftools/ffmpeg_mux_init.c.
      - flag: "-fs (file size limit)"
        status: covered
        schema: pipeline.Output.MaxFileSize
        notes: handleSink calls av.OutputFormatContext.BytesWritten (avio_tell) before every WritePacket and stops with a clean trailer once the limit is reached; mirrors fftools/ffmpeg_mux.c::mux_packet_filter.
      - flag: "-frames:v / -frames:a"
        status: covered
        schema: pipeline.Output.MaxFramesVideo / MaxFramesAudio
      - flag: "-metadata key=value (global)"
        status: covered
        schema: pipeline.Output.Metadata
        notes: compat/ffcli parses bare `-metadata key=value` into Output.Metadata; handleSink applies via applyOutputMetadata before WriteHeader.
      - flag: "-metadata:s:v:0 (per-stream)"
        status: covered
        schema: pipeline.Output.Streams[*].Metadata
        notes: compat/ffcli parses `-metadata:s:<type>:<idx> key=value` into Output.Streams; handleSink resolves the AVStream by counting muxer-add order per media type (mirrors check_stream_specifier `s:<type>:<idx>`) and writes via av_dict_set on AVStream.metadata, the same path fftools/ffmpeg_mux_init.c::of_add_metadata uses.
      - flag: "-disposition:s:v:0 (per-stream)"
        status: covered
        schema: pipeline.Output.Streams[*].Disposition
        notes: compat/ffcli parses `-disposition:s:<type>:<idx> default+forced`; handleSink calls av_opt_set on the AVStream's AVClass, which is the same code path fftools/ffmpeg_mux_init.c::set_dispositions uses to parse the `+`-separated AV_DISPOSITION_* flag list.
      - flag: "-map_metadata / -map_chapters"
        status: covered
        schema: pipeline.NodeDef{Type:"metadata_reader"|"metadata_writer"} + pipeline.EdgeDef{Type:"metadata"}
        notes: Wave 2 #11; reader.params.source/section + writer.params.target/section pair routes container metadata or chapters per-output; compat/ffcli emits the node pair on `-map_metadata IDX` / `-map_chapters IDX`.
      - flag: "chapter writing"
        status: covered
        schema: pipeline.Output.Chapters
        notes: explicit chapter list always works; metadata_writer with section=chapters routes input chapters into the output (Wave 2 #11).
      - flag: "attachments (fonts for ASS/cover art)"
        status: missing
        schema: n/a
      - flag: "cover art / thumbnail embed"
        status: missing
        schema: n/a
      - flag: "multiple outputs in one pipeline"
        status: covered
        schema: pipeline.Config.Outputs
      - flag: "tee muxer (single-pass multi-format)"
        status: covered
        schema: pipeline.Output.Kind/Targets
        notes: Output.Kind="tee" + Output.Targets[]; encoded once, fanned out to N libavformat slaves via the built-in tee muxer (-f tee "[opt=val]url|[opt=val]url"). Per-target metadata/disposition is not directly supported by libavformat (slaves clone parent metadata).
      - flag: "HLS muxer (hls_time/hls_playlist_type/EXT-X-MAP/byte-range)"
        status: covered
        schema: pipeline.Output.HLS
        notes: Wave 3 #12 — typed HLSOptions promotes hls_time, hls_init_time, hls_list_size, hls_playlist_type, hls_segment_type (mpegts|fmp4 / CMAF), hls_segment_filename, hls_fmp4_init_filename, start_number, master_pl_name + var_stream_map (ABR), and hls_flags off the generic Options bag. Output.Options remains the escape hatch for niche options; typed fields win on key collision.
      - flag: "DASH muxer"
        status: covered
        schema: pipeline.Output.DASH
        notes: Wave 3 #12 — typed DASHOptions promotes seg_duration, frag_duration, window_size, extra_window_size, init_seg_name, media_seg_name, single_file, use_template, use_timeline, streaming, adaptation_sets, hls_playlist (CMAF dual-pack), ldash, dash_flags. Same escape-hatch model as HLS.
      - flag: "segment muxer / fragmented MP4 (CMAF)"
        status: covered
        schema: pipeline.Output.HLS / pipeline.Output.DASH
        notes: CMAF delivered via HLS.SegmentType="fmp4" (HLS-side fMP4) or DASH.HLSPlaylist=true alongside DASH (dual-pack manifest). The standalone segment muxer (-f segment) remains a partial-coverage gap; tee + HLS/DASH cover the same fan-out scenarios.
      - flag: "movflags=+faststart"
        status: covered
        schema: pipeline.Output.Options.movflags
      - flag: "-muxdelay / -muxpreload / -copyts / -start_at_zero / -avoid_negative_ts"
        status: partial
        schema: pipeline.Config.CopyTS
        notes: -copyts covered (Config.CopyTS suppresses demuxer ts_offset shift and switches output-side -ss/-to to absolute timeline interpretation); -muxdelay/-muxpreload/-start_at_zero/-avoid_negative_ts still missing
      - flag: "-bsf:v / -bsf:a / -bsf:s (single)"
        status: covered
        schema: pipeline.Output.BSFVideo / BSFAudio / BSFSubtitle
      - flag: "BSF chains (-bsf:v 'h264_mp4toannexb,h264_redundant_pps')"
        status: covered
        schema: pipeline.Output.BSFVideo / BSFAudio / BSFSubtitle
        notes: parsed by libavcodec av_bsf_list_parse_str; chain spec `f1[=k=v[:k=v]][,f2]`

