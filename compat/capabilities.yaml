# MediaMolder ↔ FFmpeg capability registry.
#
# Machine-readable inventory of every FFmpeg CLI flag (or capability)
# tracked by the coverage roadmap (docs/ffmpeg-coverage-roadmap.md §2).
# Each entry pairs an FFmpeg flag with its current MediaMolder coverage
# status and a pointer at the schema field / code location that handles
# it.
#
# Status legend:
#   covered      — first-class schema field; round-trip / unit tests exist
#   partial      — works (often via AVDict passthrough) but not validated,
#                  not surfaced in the GUI, or only the common case is wired
#   missing      — no support today
#   out-of-scope — intentionally not planned (e.g. obsolete flag, dev-only)
#
# `schema` is a dotted path into pipeline.Config (Go) or, when a flag has
# no schema home yet, a code location (`pipeline/handlers.go:foo`) or the
# string "n/a".
#
# This file is the source of truth that the GUI's "unsupported flag"
# importer report and the compat/ffcli round-trip test selector both
# consume. Keep it in sync with §2 of the roadmap.

schema_version: 1

sections:

  - id: inputs
    title: Inputs / demux (roadmap §2.1)
    flags:
      - flag: "-i"
        status: covered
        schema: pipeline.Input.URL
        notes: forwarded to avformat_open_input; file/http/rtmp/rtsp/srt/pipe/device
      - flag: "-ss (input)"
        status: covered
        schema: pipeline.Input.Options.ss
        notes: parsed via av.ParseTime; demuxer-side seek (pipeline/timing.go)
      - flag: "-t (input)"
        status: covered
        schema: pipeline.Input.Options.t
        notes: per-packet recording_time stop check
      - flag: "-to (input)"
        status: covered
        schema: pipeline.Input.Options.to
        notes: converted to recording_time = to - max(ss,0)
      - flag: "-itsoffset"
        status: covered
        schema: pipeline.Input.ITSOffset
        notes: per-input PTS offset in seconds; openSource composes additively with the implicit -ss ts_offset (matches FFmpeg's `f->ts_offset = o->input_ts_offset - timestamp` in fftools/ffmpeg_demux.c). Applied via Packet.ShiftTS in handleSource for every demuxed packet.
      - flag: "-stream_loop"
        status: covered
        schema: pipeline.Input.StreamLoop
        notes: per-input integer (-1 = infinite). handleSource tracks per-iteration min/max PTS in AV_TIME_BASE us; on EOF, if loops remain, calls SeekFile(StartTime), accumulates `(max - min)` into loopOffsetUS, and shifts subsequent packets so PTS stay monotone. Mirrors fftools/ffmpeg_demux.c::seek_to_start + ts_fixup `pkt->pts += duration` arithmetic.
      - flag: "-readrate / -re"
        status: covered
        schema: pipeline.Input.ReadRate / ReadRateInitialBurst / ReadRateCatchup
        notes: per-input pacing. -re is shorthand for -readrate 1. Implemented by pipeline.readRatePacer (pipeline/read_rate.go) — faithful port of fftools/ffmpeg_demux.c::readrate_sleep including the 0.3 s lag-detection threshold and catchup multiplier. Sleeps via a context-aware time.Timer so cancellation aborts pacing immediately. Required for live-restream / RTMP / SRT egress and any HLS/DASH push that relies on segment walltime equalling media time.
      - flag: "-framerate / -r (input)"
        status: partial
        schema: pipeline.Input.Options
        notes: AVDict passthrough; not validated
      - flag: "-pix_fmt / -video_size / -pixel_format (input)"
        status: partial
        schema: pipeline.Input.Options
      - flag: "-f (input)"
        status: partial
        schema: pipeline.Input.Kind
        notes: lavfi covered via Input.Kind; arbitrary forced demuxers (rawvideo,s16le) not yet first-class
      - flag: "-thread_queue_size"
        status: partial
        schema: pipeline.Input.Options
      - flag: "-accurate_seek / -noaccurate_seek / -seek_timestamp"
        status: missing
        schema: n/a
      - flag: "-protocol_whitelist"
        status: partial
        schema: pipeline.Input.Options
        notes: should be elevated for security review
      - flag: "-f lavfi"
        status: covered
        schema: pipeline.Input.Kind
        notes: anullsrc/color/sine/testsrc/smptebars; libavdevice linked + avdevice_register_all() at init
      - flag: "image2 glob (-i 'frames/*.png')"
        status: partial
        schema: pipeline.Input.Options
      - flag: "concat demuxer (listfile)"
        status: missing
        schema: n/a
        notes: "today users build a concat filter graph; no concat: input kind"
      - flag: "-f avfoundation / dshow / v4l2 (capture)"
        status: partial
        schema: pipeline.Input.Options
      - flag: "-hwaccel / -hwaccel_device / -hwaccel_output_format"
        status: partial
        schema: pipeline.Config.GlobalOptions.HardwareAccel
        notes: global only; not per-input

  - id: stream_selection
    title: Stream selection / mapping (roadmap §2.2)
    flags:
      - flag: "default automatic stream selection"
        status: covered
        schema: pipeline.Input.Streams
      - flag: "-map 0:v:0 / -map 1:a:0"
        status: covered
        schema: pipeline.Input.Streams[].{InputIndex,Type,Track}
        notes: ffcli `-map` parser; All=true selects every stream of type
      - flag: "-map -0:s / -map 0:s?"
        status: covered
        schema: pipeline.Input.Streams[].{Negate,Optional}
        notes: Wave 2 #9; Negate removes from selection, Optional silences missing matches
      - flag: "-map p:N (program selection)"
        status: covered
        schema: pipeline.Input.Streams[].Program
        notes: Wave 2 #10; matches AVProgram.id (NOT array index) for MPEG-TS / multi-program inputs
      - flag: "-map_metadata / -map_chapters"
        status: covered
        schema: pipeline.NodeDef{Type:"metadata_reader"|"metadata_writer"} + pipeline.EdgeDef{Type:"metadata"}
        notes: Wave 2 #11; reader.params.source/section + writer.params.target/section pair routes container metadata or chapters per-output; Input.MapMetadata/MapChapters shorthand still works for single-input cases
      - flag: "-vn / -an / -sn / -dn (per output)"
        status: partial
        schema: graph edges
      - flag: "split / asplit reuse of one decoded stream"
        status: covered
        schema: pipeline.GraphDef.Edges
      - flag: "attachment streams"
        status: missing
        schema: n/a

