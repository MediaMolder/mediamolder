version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mediamolder
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: mm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d mediamolder"]
      interval: 2s
      timeout: 5s
      retries: 15

  nats:
    image: nats:2-alpine
    command: ["--js"]

  api1:
    build:
      context: ../../..
      dockerfile: Dockerfile.ci
    container_name: mm_api1
    command:
      - serve
      - "--mode=api"
      - "--addr=:8080"
      - "--state=postgres://mm:mm@postgres/mediamolder?sslmode=disable"
      - "--queue=nats://nats:4222/mediamolder"
      - "--workers=2"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure

  api2:
    build:
      context: ../../..
      dockerfile: Dockerfile.ci
    container_name: mm_api2
    command:
      - serve
      - "--mode=api"
      - "--addr=:8080"
      - "--state=postgres://mm:mm@postgres/mediamolder?sslmode=disable"
      - "--queue=nats://nats:4222/mediamolder"
      - "--workers=2"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    restart: on-failure

  nginx:
    image: nginx:alpine
    volumes:
      - "./nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    ports:
      - "8090:80"
    depends_on:
      - api1
      - api2
